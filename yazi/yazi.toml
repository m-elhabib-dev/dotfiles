[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 8
mouse_events = ["click", "scroll"]

[preview]
wrap = "yes"
tab_size = 2
max_width = 1200
max_height = 1800
cache_dir = ""

[opener]
edit = [
    { run = 'nvim "$@"', block = true }
]

play = [
    { run = 'mpv "$@"', orphan = true }
]

open = [
    { run = 'xdg-open "$1"', orphan = true }
]

extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here" }
]

[open]
prepend_rules = [
    { mime = "text/*", use = "edit" },
    { mime = "image/*", use = "open" },
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
]
