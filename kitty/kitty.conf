# Window
window_padding_width 10
background_opacity 0.9

# Font
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0

# Cursor
cursor #f5e0dc
cursor_text_color #1e1e2e

# Selection
selection_foreground #1e1e2e
selection_background #f5e0dc

# Primary colors
background #1e1e2e
foreground #cdd6f4

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Misc
enable_audio_bell no
copy_on_select yes
shell zsh
